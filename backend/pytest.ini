[pytest]
# Run all async def tests/fixtures automatically under asyncio.
asyncio_mode = auto

# Add /backend to sys.path so imports like `from db.database import ...` resolve.
pythonpath = .

# Default test discovery location.
testpaths = tests

# Suppress the pytest-asyncio deprecation warning for the session-scoped
# event_loop fixture (used to share one loop across all fixtures).
filterwarnings =
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore::DeprecationWarning:pytest_asyncio
