name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: mindmap_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/mindmap_test
      SECRET_KEY: ci-test-secret-key-not-used-in-production
      REDIS_URL: redis://localhost:6379
      ANTHROPIC_API_KEY: dummy-key-for-ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest-cov

      - name: Run tests with coverage
        working-directory: backend
        run: pytest tests/ --cov=. --cov-report=term-missing

  # ── Frontend ─────────────────────────────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: frontend
        env:
          npm_config_optional: "true"
        run: |
          rm -rf node_modules package-lock.json
          npm install --prefer-offline=false --ignore-scripts=false

      - name: Build
        working-directory: frontend
        run: npm run build
