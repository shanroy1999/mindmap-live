# alembic.ini — Alembic configuration for MindMap Live backend
#
# DO NOT set sqlalchemy.url here.  DATABASE_URL is read from the environment
# (or backend/.env) inside alembic/env.py.
#
# Common commands (run from backend/):
#   alembic upgrade head                       # apply all pending migrations
#   alembic upgrade head --sql > upgrade.sql   # preview SQL without applying
#   alembic revision --autogenerate -m "..."   # generate a new migration
#   alembic downgrade -1                       # roll back the last migration
#   alembic current                            # show current revision
#   alembic history --verbose                  # list all revisions

[alembic]
# Path to migration scripts, relative to this file.
script_location = alembic

# Timestamp-prefixed filenames keep the versions/ directory sortable.
# Example: 20240315_a1b2c3d4e5f6_create_initial_schema.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Add backend/ to sys.path so that `db`, `models`, etc. are importable.
prepend_sys_path = .

# Timezone for revision timestamps written into migration file headers.
timezone = UTC

# Max line length for Black-compatible generated code.
line_length = 88

# ── Logging ───────────────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
